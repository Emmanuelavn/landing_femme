<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 760" width="420" height="760" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <pattern id="wabg" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#ECE5DD"/>
      <circle cx="10" cy="10" r="1" fill="#D8D0C5" opacity="0.6"/>
      <circle cx="40" cy="30" r="1" fill="#D8D0C5" opacity="0.5"/>
      <circle cx="25" cy="50" r="0.8" fill="#D8D0C5" opacity="0.5"/>
      <path d="M5 35 Q15 30 25 35" stroke="#D8D0C5" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
    <filter id="bubbleShadow"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.12"/></filter>
  </defs>

  <!-- background -->
  <rect width="420" height="760" fill="url(#wabg)"/>

  <!-- Header WhatsApp -->
  <rect x="0" y="0" width="420" height="64" fill="#075E54"/>
  <text x="18" y="28" fill="white" font-size="13" opacity="0.85">←</text>
  <circle cx="48" cy="32" r="16" fill="#B89265"/>
  <text x="48" y="37" text-anchor="middle" fill="white" font-size="13" font-weight="600">E</text>
  <text x="76" y="30" fill="white" font-size="15" font-weight="600">ELYX • Boutique</text>
  <text x="76" y="46" fill="white" font-size="11" opacity="0.85">en ligne</text>
  <text x="370" y="36" fill="white" font-size="16">⋮</text>
  <text x="340" y="36" fill="white" font-size="14">📞</text>

  <!-- Date badge -->
  <rect x="170" y="80" width="80" height="22" rx="11" fill="#E1F2FB" opacity="0.95"/>
  <text x="210" y="95" text-anchor="middle" fill="#54656F" font-size="10" font-weight="500">AUJOURD'HUI</text>

  <!-- Message 1 — cliente (left, white) -->
  <g filter="url(#bubbleShadow)">
    <path d="M18 118 Q14 118 14 124 L14 178 Q14 184 20 184 L246 184 Q252 184 252 178 L252 124 Q252 118 246 118 L24 118 L18 124 Z" fill="#FFFFFF"/>
  </g>
  <text x="24" y="135" fill="#111B21" font-size="12.5">Bonjour ! Je viens de recevoir le livre.</text>
  <text x="24" y="151" fill="#111B21" font-size="12.5">Ma fille de 7 ans l'a lu hier soir avant</text>
  <text x="24" y="167" fill="#111B21" font-size="12.5">de dormir et elle a fait sa première</text>
  <text x="24" y="183" fill="#111B21" font-size="12.5">prière toute seule 🥹</text>
  <text x="232" y="196" fill="#667781" font-size="9">07:14</text>

  <!-- Message 2 — réponse ELYX (right, green) -->
  <g filter="url(#bubbleShadow)">
    <rect x="198" y="208" width="208" height="42" rx="8" fill="#D9FDD3"/>
  </g>
  <text x="204" y="226" fill="#111B21" font-size="12.5">Oh ça nous touche tellement 🤍</text>
  <text x="204" y="241" fill="#111B21" font-size="12.5">Continuez, c'est précieux.</text>
  <text x="380" y="262" fill="#667781" font-size="9">07:18 ✓✓</text>

  <!-- Message 3 — autre cliente (left) -->
  <g filter="url(#bubbleShadow)">
    <rect x="18" y="278" width="234" height="76" rx="8" fill="#FFFFFF"/>
  </g>
  <text x="24" y="296" fill="#111B21" font-size="12.5">Mon garçon de 5 ans connaît déjà 3</text>
  <text x="24" y="311" fill="#111B21" font-size="12.5">prières par cœur ! Il les récite à son</text>
  <text x="24" y="326" fill="#111B21" font-size="12.5">papa au téléphone quand on l'appelle.</text>
  <text x="24" y="341" fill="#111B21" font-size="12.5">Vraiment merci pour ce livre ❤️</text>
  <text x="232" y="354" fill="#667781" font-size="9">11:42</text>

  <!-- Message 4 — cliente (left) -->
  <g filter="url(#bubbleShadow)">
    <path d="M18 372 Q14 372 14 378 L14 432 Q14 438 20 438 L246 438 Q252 438 252 432 L252 378 Q252 372 246 372 L24 372 L18 378 Z" fill="#FFFFFF"/>
  </g>
  <text x="24" y="389" fill="#111B21" font-size="12.5">J'ai offert le livre à ma nièce pour</text>
  <text x="24" y="405" fill="#111B21" font-size="12.5">ses 8 ans. Sa maman m'a appelée hier</text>
  <text x="24" y="421" fill="#111B21" font-size="12.5">pour me dire que c'était le plus beau</text>
  <text x="24" y="437" fill="#111B21" font-size="12.5">cadeau qu'elle ait reçu 🙏</text>
  <text x="232" y="450" fill="#667781" font-size="9">14:08</text>

  <!-- Message 5 — réponse ELYX -->
  <g filter="url(#bubbleShadow)">
    <rect x="218" y="462" width="188" height="42" rx="8" fill="#D9FDD3"/>
  </g>
  <text x="224" y="480" fill="#111B21" font-size="12.5">C'est exactement le but 🌟</text>
  <text x="224" y="495" fill="#111B21" font-size="12.5">Merci pour ce retour.</text>
  <text x="380" y="516" fill="#667781" font-size="9">14:11 ✓✓</text>

  <!-- Message 6 — cliente -->
  <g filter="url(#bubbleShadow)">
    <rect x="18" y="532" width="240" height="60" rx="8" fill="#FFFFFF"/>
  </g>
  <text x="24" y="550" fill="#111B21" font-size="12.5">Franchement les 2500 fcfa c'est</text>
  <text x="24" y="565" fill="#111B21" font-size="12.5">rien comparé à voir mon enfant prier</text>
  <text x="24" y="580" fill="#111B21" font-size="12.5">tout seul chaque soir. Je recommande</text>
  <text x="237" y="594" fill="#667781" font-size="9">19:32</text>

  <!-- Message 7 — cliente -->
  <g filter="url(#bubbleShadow)">
    <rect x="18" y="606" width="226" height="44" rx="8" fill="#FFFFFF"/>
  </g>
  <text x="24" y="624" fill="#111B21" font-size="12.5">Je l'ai déjà envoyé à 5 amies. Toutes</text>
  <text x="24" y="639" fill="#111B21" font-size="12.5">l'ont commandé. Que Dieu vous bénisse 🤲</text>
  <text x="222" y="652" fill="#667781" font-size="9">20:47</text>

  <!-- Message 8 — cliente (vocal) -->
  <g filter="url(#bubbleShadow)">
    <rect x="18" y="666" width="200" height="40" rx="20" fill="#FFFFFF"/>
  </g>
  <circle cx="38" cy="686" r="11" fill="#00A884"/>
  <polygon points="35,681 35,691 43,686" fill="white"/>
  <line x1="56" y1="686" x2="180" y2="686" stroke="#00A884" stroke-width="1.2" opacity="0.4"/>
  <circle cx="80" cy="686" r="2" fill="#00A884"/>
  <text x="190" y="690" fill="#667781" font-size="10">0:42</text>
  <text x="200" y="697" fill="#667781" font-size="9">21:03</text>

  <!-- Input bar -->
  <rect x="0" y="708" width="420" height="52" fill="#F0F2F5"/>
  <rect x="12" y="720" width="340" height="32" rx="16" fill="white"/>
  <text x="28" y="740" fill="#8696A0" font-size="12">Message</text>
  <text x="328" y="740" fill="#8696A0" font-size="14">😊</text>
  <circle cx="380" cy="736" r="18" fill="#00A884"/>
  <text x="380" y="741" text-anchor="middle" fill="white" font-size="14">🎤</text>
</svg>
